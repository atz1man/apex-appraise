server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /trpc/ {
    proxy_pass http://api:4100;
    proxy_set_header Host $host;
  }

  location /uploads/ {
    proxy_pass http://api:4100;
    proxy_set_header Host $host;
    client_max_body_size 100m;
  }

  location /reports/ {
    proxy_pass http://api:4100;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
  }

  location /webhooks/ {
    proxy_pass http://api:4100;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri /index.html;
  }
}
