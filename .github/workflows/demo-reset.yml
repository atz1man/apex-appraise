name: Demo reset

# Nightly wipe + reseed of the public demo org so the live demo at
# apex-appraise-web.fly.dev always looks pristine. Goes through the web nginx
# proxy (the api app is flycast-only). Requires the DEMO_RESET_TOKEN repo
# secret to match the api app's RESET_TOKEN.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset the demo org
        run: >-
          curl -fsS -X POST https://apex-appraise-web.fly.dev/admin/reset-demo
          -H "x-reset-token: ${{ secrets.DEMO_RESET_TOKEN }}"
